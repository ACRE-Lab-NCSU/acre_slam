# rko config
lidar_topic: /unitree/slam_lidar/points
imu_topic: /unitree/slam_lidar/imu
imu_frame: livox_frame
lidar_frame: livox_frame
base_frame: base_link
odom_frame: odom

# Performance
# max_num_threads: 4
max_iterations: 50
double_downsample: true

# Map parameters
voxel_size: 0.2
max_points_per_voxel: 10
max_range: 20.0
min_range: 0.5
max_correspondance_distance: 0.3

# IMU
initialization_phase: true
deskew: true
lts_force_relative: false

# Output
publish_local_map: true
publish_map_after: 1.0
publish_deskewed_scan: true